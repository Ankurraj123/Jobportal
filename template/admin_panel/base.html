{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="display:flex; min-height:calc(100vh - var(--navbar-height));">

    <!-- Sidebar -->
    <aside
        style="width:240px; flex-shrink:0; background:var(--bg-card); border-right:1px solid var(--border-color); padding:24px 16px; position:sticky; top:var(--navbar-height); height:calc(100vh - var(--navbar-height)); overflow-y:auto;">
        <div
            style="font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px; padding:0 8px;">
            Admin Panel</div>

        <nav>
            <a href="{% url 'admin_panel:dashboard' %}"
                style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:var(--text-primary); font-size:0.875rem; font-weight:500; margin-bottom:4px; {% if request.resolver_match.url_name == 'dashboard' %}background:var(--accent-light); color:var(--accent);{% endif %}">
                📊 Dashboard
            </a>
            <a href="{% url 'admin_panel:employees' %}"
                style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:var(--text-primary); font-size:0.875rem; font-weight:500; margin-bottom:4px; {% if request.resolver_match.url_name == 'employees' %}background:var(--accent-light); color:var(--accent);{% endif %}">
                👤 Employees
            </a>
            <a href="{% url 'admin_panel:employers' %}"
                style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:var(--text-primary); font-size:0.875rem; font-weight:500; margin-bottom:4px; {% if request.resolver_match.url_name == 'employers' %}background:var(--accent-light); color:var(--accent);{% endif %}">
                🏢 Employers
            </a>
            <a href="{% url 'admin_panel:jobs' %}"
                style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:var(--text-primary); font-size:0.875rem; font-weight:500; margin-bottom:4px; {% if request.resolver_match.url_name == 'jobs' %}background:var(--accent-light); color:var(--accent);{% endif %}">
                💼 Jobs
            </a>

            <div style="height:1px; background:var(--border-color); margin:16px 0;"></div>

            <a href="{% url 'jobapp:home' %}"
                style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:var(--text-muted); font-size:0.875rem; font-weight:500;">
                ← Back to Site
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main style="flex:1; padding:32px; overflow-y:auto; background:var(--bg-primary);">
        {% include 'messages.html' %}
        {% block panel_content %}{% endblock %}
    </main>

</div>
{% endblock %}
